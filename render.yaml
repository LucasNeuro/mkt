services:
  - type: web
    name: uazapi-helper
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: UAZAPI_BASE_URL
        value: https://onnzetecnologia.uazapi.com
      - key: UAZAPI_INSTANCE_NAME
        value: RTEPORT_INSTANTANEO
      - key: UAZAPI_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: ADMIN_PHONES
        sync: false
      - key: APP_TIMEZONE
        value: America/Sao_Paulo
